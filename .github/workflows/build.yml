name: Build ESP32 Arduino

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build
        run: pio run

      - name: List build output
        run: find .pio/build -type f -name "*.bin" -o -name "*.elf" -o -name "*.map" | head -20

      - name: List build output
        run: find .pio/build -type f \( -name "*.bin" -o -name "*.elf" \) -exec ls -lh {} \;

      - name: Merge firmware (esptool)
        run: |
          python -m esptool --chip esp32s3 merge_bin \
            -o .pio/build/esp32-s3-n16r8/firmware-merged.bin \
            --flash_mode dio \
            --flash_freq 80m \
            --flash_size 16MB \
            0x0 .pio/build/esp32-s3-n16r8/bootloader.bin \
            0x8000 .pio/build/esp32-s3-n16r8/partitions.bin \
            0x10000 .pio/build/esp32-s3-n16r8/firmware.bin
          ls -lh .pio/build/esp32-s3-n16r8/firmware-merged.bin

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-biodome-firmware
          path: |
            .pio/build/esp32-s3-n16r8/firmware.bin
            .pio/build/esp32-s3-n16r8/bootloader.bin
            .pio/build/esp32-s3-n16r8/partitions.bin
            .pio/build/esp32-s3-n16r8/firmware-merged.bin
          if-no-files-found: warn
